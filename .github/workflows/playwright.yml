name: Playwright Tests

on:
  workflow_dispatch:
    inputs:
      golden_id:
        description: 'Golden test ID to run'
        required: false
        type: string
      golden_ids:
        description: 'Comma-separated golden test IDs'
        required: false
        type: string
      golden_name:
        description: 'Golden test name'
        required: false
        type: string

jobs:
  test:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ci/requirements.txt

      - name: Install Playwright browsers
        run: npx playwright install

      - name: Export golden tests to .spec.ts files
        run: |
          if [ -n "${{ inputs.golden_ids }}" ]; then
            python ci/export_goldens.py --from golden --to tests --ids "${{ inputs.golden_ids }}"
          elif [ -n "${{ inputs.golden_id }}" ]; then
            python ci/export_goldens.py --from golden --to tests --ids "${{ inputs.golden_id }}"
          else
            python ci/export_goldens.py --from golden --to tests
          fi

      - name: Install npm dependencies
        run: npm install

      - name: Run Playwright tests
        run: npx playwright test --reporter=json,html
        continue-on-error: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Publish test summary
        if: always()
        run: |
          REPORT="playwright-report/results.json"
          if [ ! -f "$REPORT" ]; then
            echo "## Playwright Tests" >> $GITHUB_STEP_SUMMARY
            echo "No JSON report found." >> $GITHUB_STEP_SUMMARY
            exit 0
          fi
          TOTAL=$(jq '[.suites[].specs[]] | length' "$REPORT" 2>/dev/null || echo 0)
          PASSED=$(jq '[.suites[].specs[] | select(.tests[].results[].status == "passed")] | length' "$REPORT" 2>/dev/null || echo 0)
          FAILED=$(jq '[.suites[].specs[] | select(.tests[].results[].status == "failed")] | length' "$REPORT" 2>/dev/null || echo 0)
          echo "## Playwright Test Results" >> $GITHUB_STEP_SUMMARY
          echo "| Result | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| ✅ Passed | $PASSED |" >> $GITHUB_STEP_SUMMARY
          echo "| ❌ Failed | $FAILED |" >> $GITHUB_STEP_SUMMARY
          echo "| 📋 Total  | $TOTAL |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Full HTML report available in the **playwright-report** artifact above." >> $GITHUB_STEP_SUMMARY
