# ── Playwright AI Studio — Deploy to Azure Container Apps ─────────────────────
#
# Triggers:
#   • Push to main that touches studio/ or deploy/  → build + deploy
#   • Manual run from Actions tab (any branch)
#
# Required GitHub secrets (set once after running deploy/provision.sh):
#   AZURE_CREDENTIALS      — service principal JSON from provision.sh output
#   ACR_LOGIN_SERVER       — e.g. acrplaywrightmcp.azurecr.io
#   ACR_USERNAME           — ACR admin username
#   ACR_PASSWORD           — ACR admin password  (mark as secret)
#   ACA_RESOURCE_GROUP     — rg-playwright-mcp
#   ACA_APP_NAME           — ca-playwright-studio
# ─────────────────────────────────────────────────────────────────────────────

name: Deploy to Azure Container Apps

on:
  push:
    branches: [main]
    paths:
      - "studio/**"
      - "deploy/**"
      - "scripts/**"
  workflow_dispatch:
    inputs:
      force_deploy:
        description: "Force deploy even if no studio/ changes"
        type: boolean
        default: false

env:
  IMAGE_NAME: playwright-studio

jobs:
  build-and-deploy:
    name: Build → Push → Deploy
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Azure login ───────────────────────────────────────────────────────
      # azure/login action broke JSON-creds support in recent releases.
      # Parse the secret ourselves and call az login directly — works with both
      # old format (appId/password/tenant) and new format (clientId/clientSecret/tenantId).
      - name: Azure login
        env:
          AZURE_CREDS: ${{ secrets.AZURE_CREDENTIALS }}
        run: |
          CLIENT_ID=$(echo "$AZURE_CREDS"     | jq -r '.clientId    // .appId')
          CLIENT_SECRET=$(echo "$AZURE_CREDS" | jq -r '.clientSecret // .password')
          TENANT_ID=$(echo "$AZURE_CREDS"     | jq -r '.tenantId    // .tenant')
          SUB_ID=$(echo "$AZURE_CREDS"        | jq -r '.subscriptionId // empty')
          echo "::add-mask::$CLIENT_SECRET"
          az login --service-principal \
            --username "$CLIENT_ID" \
            --password "$CLIENT_SECRET" \
            --tenant  "$TENANT_ID"
          [ -n "$SUB_ID" ] && az account set --subscription "$SUB_ID" || true

      # ── 3. Build image in Azure (no Docker runner needed) ───────────────────
      - name: Build image via az acr build
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          az acr build \
            --no-cache \
            --registry $(echo "${{ secrets.ACR_LOGIN_SERVER }}" | cut -d. -f1) \
            --resource-group ${{ secrets.ACA_RESOURCE_GROUP }} \
            --image ${{ env.IMAGE_NAME }}:latest \
            --image ${{ env.IMAGE_NAME }}:${SHORT_SHA} \
            --file deploy/Dockerfile \
            .

      # ── 4. Deploy new image + set all env vars in one revision ─────────────────
      # Using az containerapp update directly so image + env vars land in a single
      # revision — avoids a second revision that would restart the container and
      # cause the smoke test to hit a partially-configured instance.
      - name: Deploy image + configure env vars
        id: app_url
        run: |
          FQDN=$(az containerapp show \
            --name ${{ secrets.ACA_APP_NAME }} \
            --resource-group ${{ secrets.ACA_RESOURCE_GROUP }} \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          SUB=$(az account show --query id -o tsv)

          az containerapp update \
            --name ${{ secrets.ACA_APP_NAME }} \
            --resource-group ${{ secrets.ACA_RESOURCE_GROUP }} \
            --image ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest \
            --set-env-vars \
              "EXPLORE_MODE=github_runner" \
              "STUDIO_PUBLIC_URL=https://${FQDN}" \
              "AZURE_SUBSCRIPTION_ID=${SUB}" \
              "AZURE_RESOURCE_GROUP=${{ secrets.ACA_RESOURCE_GROUP }}" \
              "AZURE_CONTAINER_APP_NAME=${{ secrets.ACA_APP_NAME }}" \
              "GITHUB_TOKEN=${{ secrets.STUDIO_GITHUB_TOKEN }}" \
              "GITHUB_OWNER=rohitshetty84" \
              "GITHUB_REPO=Playwright_V2" \
              "GITHUB_BRANCH=main" \
              "AZURE_OPENAI_API_KEY=${{ secrets.AZURE_OPENAI_API_KEY }}" \
              "AZURE_OPENAI_ENDPOINT=${{ secrets.AZURE_OPENAI_ENDPOINT }}" \
              "AZURE_OPENAI_API_VERSION=${{ secrets.AZURE_OPENAI_API_VERSION }}" \
              "AZURE_OPENAI_DEPLOYMENT=${{ secrets.AZURE_OPENAI_DEPLOYMENT }}"

          echo "url=https://${FQDN}" >> "$GITHUB_OUTPUT"
          echo "### Deployed" >> $GITHUB_STEP_SUMMARY
          echo "**URL**: https://${FQDN}" >> $GITHUB_STEP_SUMMARY
          echo "**Image**: \`${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest\`" >> $GITHUB_STEP_SUMMARY

      # ── 6. Post-deploy smoke test ────────────────────────────────────────────
      # Waits for the NEW revision to reach Running state (not just the server
      # to respond — the old revision might still be answering requests during
      # the rolling update), then runs a minimal exploration smoke test.
      - name: Smoke test
        run: |
          pip install httpx --quiet

          # Step A: wait for the NEW revision (by name) to be provisioned (up to 3 min).
          # Capture the expected revision name right after containerapp update so we
          # don't accidentally watch an old revision that's already Running.
          EXPECTED_REV=$(az containerapp revision list \
            --name ${{ secrets.ACA_APP_NAME }} \
            --resource-group ${{ secrets.ACA_RESOURCE_GROUP }} \
            --query "[0].name" -o tsv 2>/dev/null)
          echo "Waiting for revision $EXPECTED_REV to be provisioned…"
          for i in $(seq 1 30); do
            REV_STATE=$(az containerapp revision show \
              --name ${{ secrets.ACA_APP_NAME }} \
              --resource-group ${{ secrets.ACA_RESOURCE_GROUP }} \
              --revision "$EXPECTED_REV" \
              --query "properties.runningState" -o tsv 2>/dev/null)
            echo "  attempt $i: revision=$EXPECTED_REV state=$REV_STATE"
            if [ "$REV_STATE" = "Running" ] || [ "$REV_STATE" = "ScaledToZero" ]; then
              echo "Revision is ready (state=$REV_STATE)."
              break
            elif [ "$REV_STATE" = "Failed" ]; then
              echo "ERROR: Revision $EXPECTED_REV failed to start — aborting."
              exit 1
            fi
            # New revision may not be listed yet — re-check the latest
            LATEST_REV=$(az containerapp revision list \
              --name ${{ secrets.ACA_APP_NAME }} \
              --resource-group ${{ secrets.ACA_RESOURCE_GROUP }} \
              --query "[0].name" -o tsv 2>/dev/null)
            if [ "$LATEST_REV" != "$EXPECTED_REV" ]; then
              echo "  New revision appeared: $LATEST_REV — switching to watch it"
              EXPECTED_REV="$LATEST_REV"
            fi
            sleep 10
          done

          # Step B: wait for the server to respond (up to 2 min)
          echo "Waiting for server to respond…"
          for i in $(seq 1 24); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ steps.app_url.outputs.url }}/")
            if [ "$STATUS" = "200" ]; then echo "Server ready (attempt $i)"; break; fi
            echo "  attempt $i: HTTP $STATUS — retrying in 5s"
            sleep 5
          done

          # Step C: verify the NEW index.html was actually deployed (not a stale cached build).
          # If this fails the deploy silently served old code — treat as a hard failure.
          echo "Verifying deployed index.html contains expected code…"
          INDEX_HTML=$(curl -s "${{ steps.app_url.outputs.url }}/")
          if echo "$INDEX_HTML" | grep -qF "api('GET', '/batch/')"; then
            echo "✓ index.html verified: fetchBatches uses trailing slash"
          else
            echo "✗ DEPLOY VERIFICATION FAILED: index.html still has old code (no trailing slash)"
            echo "  This means ACR served a cached image or ACA is routing to an old revision."
            exit 1
          fi

          # Step D: extra buffer — let the new container fully stabilise
          echo "Letting container stabilise (30s)…"
          sleep 30

          python scripts/smoke_deploy.py \
            --url "${{ steps.app_url.outputs.url }}" \
            --ci
