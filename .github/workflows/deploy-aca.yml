# ── Playwright AI Studio — Deploy to Azure Container Apps ─────────────────────
#
# Triggers:
#   • Push to main that touches studio/ or deploy/  → build + deploy
#   • Manual run from Actions tab (any branch)
#
# Required GitHub secrets (set once after running deploy/provision.sh):
#   AZURE_CREDENTIALS      — service principal JSON from provision.sh output
#   ACR_LOGIN_SERVER       — e.g. acrplaywrightmcp.azurecr.io
#   ACR_USERNAME           — ACR admin username
#   ACR_PASSWORD           — ACR admin password  (mark as secret)
#   ACA_RESOURCE_GROUP     — rg-playwright-mcp
#   ACA_APP_NAME           — ca-playwright-studio
# ─────────────────────────────────────────────────────────────────────────────

name: Deploy to Azure Container Apps

on:
  push:
    branches: [main]
    paths:
      - "studio/**"
      - "deploy/**"
      - "scripts/**"
  workflow_dispatch:
    inputs:
      force_deploy:
        description: "Force deploy even if no studio/ changes"
        type: boolean
        default: false

env:
  IMAGE_NAME: playwright-studio

jobs:
  build-and-deploy:
    name: Build → Push → Deploy
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Azure login ───────────────────────────────────────────────────────
      # azure/login action broke JSON-creds support in recent releases.
      # Parse the secret ourselves and call az login directly — works with both
      # old format (appId/password/tenant) and new format (clientId/clientSecret/tenantId).
      - name: Azure login
        env:
          AZURE_CREDS: ${{ secrets.AZURE_CREDENTIALS }}
        run: |
          CLIENT_ID=$(echo "$AZURE_CREDS"     | jq -r '.clientId    // .appId')
          CLIENT_SECRET=$(echo "$AZURE_CREDS" | jq -r '.clientSecret // .password')
          TENANT_ID=$(echo "$AZURE_CREDS"     | jq -r '.tenantId    // .tenant')
          SUB_ID=$(echo "$AZURE_CREDS"        | jq -r '.subscriptionId // empty')
          echo "::add-mask::$CLIENT_SECRET"
          az login --service-principal \
            --username "$CLIENT_ID" \
            --password "$CLIENT_SECRET" \
            --tenant  "$TENANT_ID"
          [ -n "$SUB_ID" ] && az account set --subscription "$SUB_ID" || true

      # ── 3. Build image in Azure (no Docker runner needed) ───────────────────
      - name: Build image via az acr build
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          az acr build \
            --registry $(echo "${{ secrets.ACR_LOGIN_SERVER }}" | cut -d. -f1) \
            --resource-group ${{ secrets.ACA_RESOURCE_GROUP }} \
            --image ${{ env.IMAGE_NAME }}:latest \
            --image ${{ env.IMAGE_NAME }}:${SHORT_SHA} \
            --file deploy/Dockerfile \
            .

      # ── 4. Deploy to Container App ───────────────────────────────────────────
      - name: Deploy to Azure Container Apps
        uses: azure/container-apps-deploy-action@v2
        with:
          resourceGroup: ${{ secrets.ACA_RESOURCE_GROUP }}
          containerAppName: ${{ secrets.ACA_APP_NAME }}
          imageToDeploy: ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest

      # ── 5. Get app URL ───────────────────────────────────────────────────────
      - name: Get app URL
        id: app_url
        run: |
          URL=$(az containerapp show \
            --name ${{ secrets.ACA_APP_NAME }} \
            --resource-group ${{ secrets.ACA_RESOURCE_GROUP }} \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          echo "url=https://$URL" >> "$GITHUB_OUTPUT"
          echo "### Deployed" >> $GITHUB_STEP_SUMMARY
          echo "**URL**: https://$URL" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image**: \`${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest\`" >> $GITHUB_STEP_SUMMARY

      # ── 5b. Configure runner-mode env vars on Container App ─────────────────
      - name: Set runner env vars on Container App
        run: |
          FQDN=$(az containerapp show \
            --name ${{ secrets.ACA_APP_NAME }} \
            --resource-group ${{ secrets.ACA_RESOURCE_GROUP }} \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          SUB=$(az account show --query id -o tsv)

          az containerapp update \
            --name ${{ secrets.ACA_APP_NAME }} \
            --resource-group ${{ secrets.ACA_RESOURCE_GROUP }} \
            --set-env-vars \
              "EXPLORE_MODE=github_runner" \
              "STUDIO_PUBLIC_URL=https://${FQDN}" \
              "AZURE_SUBSCRIPTION_ID=${SUB}" \
              "AZURE_RESOURCE_GROUP=${{ secrets.ACA_RESOURCE_GROUP }}" \
              "AZURE_CONTAINER_APP_NAME=${{ secrets.ACA_APP_NAME }}"

      # ── 6. Post-deploy smoke test ────────────────────────────────────────────
      # Waits for the NEW revision to reach Running state (not just the server
      # to respond — the old revision might still be answering requests during
      # the rolling update), then runs a minimal exploration smoke test.
      - name: Smoke test
        run: |
          pip install httpx --quiet

          # Step A: wait for the latest revision to be provisioned (up to 3 min).
          # Accept both "Running" (replicas active) and "ScaledToZero" (healthy,
          # no traffic yet) — both mean the revision deployed successfully.
          # "Provisioning" / "Deprovisioning" / empty = still rolling out.
          echo "Waiting for new revision to be provisioned…"
          for i in $(seq 1 18); do
            LATEST_REV=$(az containerapp revision list \
              --name ${{ secrets.ACA_APP_NAME }} \
              --resource-group ${{ secrets.ACA_RESOURCE_GROUP }} \
              --query "[0].name" -o tsv 2>/dev/null)
            REV_STATE=$(az containerapp revision show \
              --name ${{ secrets.ACA_APP_NAME }} \
              --resource-group ${{ secrets.ACA_RESOURCE_GROUP }} \
              --revision "$LATEST_REV" \
              --query "properties.runningState" -o tsv 2>/dev/null)
            echo "  attempt $i: revision=$LATEST_REV state=$REV_STATE"
            if [ "$REV_STATE" = "Running" ] || [ "$REV_STATE" = "ScaledToZero" ]; then
              echo "Revision is ready (state=$REV_STATE)."
              break
            fi
            sleep 10
          done

          # Step B: wait for the server to respond on the new revision (up to 2 min)
          echo "Waiting for server to respond…"
          for i in $(seq 1 24); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ steps.app_url.outputs.url }}/")
            if [ "$STATUS" = "200" ]; then echo "Server ready (attempt $i)"; break; fi
            echo "  attempt $i: HTTP $STATUS — retrying in 5s"
            sleep 5
          done

          # Step C: extra buffer — let the new container fully stabilise
          echo "Letting container stabilise (30s)…"
          sleep 30

          python scripts/smoke_deploy.py \
            --url "${{ steps.app_url.outputs.url }}" \
            --ci
