name: Playwright Golden Test Run

# ── Trigger only via workflow_dispatch (from Studio UI) ──────────────────────
on:
  workflow_dispatch:
    inputs:
      golden_name:
        description: 'Golden test name to run'
        required: true
        type: string
      golden_id:
        description: 'Golden test ID'
        required: true
        type: string
      studio_url:
        description: 'Studio API URL (optional)'
        required: false
        type: string
        default: 'http://localhost:8000'

jobs:
  playwright-test:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps msedge

      - name: Run specific golden test
        id: test
        run: |
          echo "Running golden: ${{ inputs.golden_name }}"
          npx playwright test --grep "${{ inputs.golden_name }}" --reporter=list,html,json,junit
        continue-on-error: true

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ inputs.golden_id }}
          path: playwright-report/
          retention-days: 7

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ inputs.golden_id }}
          path: |
            test-results/
            blob-report/
          retention-days: 7

      - name: Publish HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: html-report-${{ inputs.golden_id }}
          path: playwright-report/index.html

      - name: Parse and Send Results to Studio
        if: always()
        shell: pwsh
        env:
          STUDIO_URL: ${{ secrets.STUDIO_URL || inputs.studio_url }}
        run: |
          # Read JSON results if they exist
          $resultsPath = "test-results/results.json"
          $candidates = @()

          if (Test-Path $resultsPath) {
            $results = Get-Content $resultsPath | ConvertFrom-Json

            # Extract test suites and their results
            foreach ($suite in $results.suites) {
              foreach ($test in $suite.tests) {
                $candidate = @{
                  name = $test.title
                  path = "A"  # Default path; adjust if you have path info in title
                  status = if ($test.status -eq "passed") { "pass" } else { "fail" }
                  duration = "$($test.duration)ms"
                }

                if ($test.status -eq "failed") {
                  $errorMsg = $test.error.message
                  if ($errorMsg) {
                    $candidate.error = $errorMsg.Substring(0, [Math]::Min(200, $errorMsg.Length))
                  }
                }

                $candidates += $candidate
              }
            }
          } else {
            # Fallback if no JSON results
            $candidates = @(@{
              name = "${{ inputs.golden_name }}"
              path = "A"
              status = if ("${{ steps.test.outcome }}" -eq "failure") { "fail" } else { "pass" }
              duration = "—"
              error = "Could not parse detailed results"
            })
          }

          # Create payload to send back to Studio
          $payload = @{
            golden_id = "${{ inputs.golden_id }}"
            browser = "msedge"
            candidates = $candidates
          } | ConvertTo-Json

          Write-Host "📊 Test Results:"
          Write-Host $payload

          # Send to Studio API
          $studioUrl = $env:STUDIO_URL
          if ($studioUrl -and $studioUrl -ne "") {
            try {
              Write-Host "📤 Sending to Studio: $studioUrl/api/runs"
              $response = Invoke-WebRequest `
                -Uri "$studioUrl/api/runs" `
                -Method Post `
                -ContentType "application/json" `
                -Body $payload `
                -ErrorAction Stop

              Write-Host "✅ Results sent to Studio successfully!"
              Write-Host "Response: $($response.StatusCode)"
            } catch {
              Write-Host "⚠️  Could not send results to Studio: $_"
              Write-Host "This is OK - you can still view results in GitHub artifacts"
              Write-Host ""
              Write-Host "📋 How to fix:"
              Write-Host "1. Add Studio URL: Settings → Secrets and variables → Actions → New repository secret"
              Write-Host "2. Name: STUDIO_URL"
              Write-Host "3. Value: https://your-ngrok-url (or public Studio URL)"
              Write-Host "4. Re-run the workflow"
            }
          } else {
            Write-Host "⚠️  Studio URL not configured"
            Write-Host ""
            Write-Host "📋 How to configure:"
            Write-Host "Option A - GitHub Secret (Recommended):"
            Write-Host "  1. Go to Settings → Secrets and variables → Actions"
            Write-Host "  2. Click 'New repository secret'"
            Write-Host "  3. Name: STUDIO_URL"
            Write-Host "  4. Value: https://your-studio-url"
            Write-Host ""
            Write-Host "Option B - Manual input:"
            Write-Host "  1. When triggering workflow, enter studio_url"
            Write-Host "  2. Example: https://xxxx-xx-xxx-xxx.ngrok-free.app"
          }

      - name: Test Summary
        if: always()
        run: |
          echo "✅ Test completed for: ${{ inputs.golden_name }}"
          echo "📊 Results:"
          echo "  - Status: ${{ steps.test.outcome }}"
          echo "  - Golden ID: ${{ inputs.golden_id }}"
          echo "  - Artifacts: Available in Actions tab"
          echo ""
          echo "📋 Next steps:"
          echo "  1. Review HTML report in artifacts"
          echo "  2. If tests failed, go to Studio → Auto-Heal"
          echo "  3. Select this golden and click 'Run Auto-Heal'"
          echo "  4. Review changes and promote if satisfied"

      - name: Exit with test status
        if: steps.test.outcome == 'failure'
        run: exit 1
